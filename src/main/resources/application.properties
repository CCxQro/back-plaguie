# configure your datasource
quarkus.datasource.db-kind = mysql
quarkus.datasource.username = [USERNAME]
quarkus.datasource.password = [PASSWORD]
quarkus.datasource.jdbc.url = jdbc:mysql://localhost:3306/[DATABASE_NAME]

# drop and create the database at startup (use `update` to only update the schema)
quarkus.hibernate-orm.schema-management.strategy = drop-and-create

# Firebase configuration - path to the service account JSON file downloaded from Firebase Console
firebase.service-account-location=src/main/resources/[RESOURCE_NAME].json
