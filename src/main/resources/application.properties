# configure your datasource
quarkus.datasource.db-kind = mysql
quarkus.datasource.username = ${QUARKUS_DATASOURCE_USERNAME}
quarkus.datasource.password = ${QUARKUS_DATASOURCE_PASSWORD}
quarkus.datasource.jdbc.url = ${QUARKUS_DATASOURCE_JDBC_URL}

%dev.quarkus.datasource.username = ${QUARKUS_DATASOURCE_USERNAME:root}
%dev.quarkus.datasource.password = ${QUARKUS_DATASOURCE_PASSWORD:emi8187$}
%dev.quarkus.datasource.jdbc.url = ${QUARKUS_DATASOURCE_JDBC_URL:jdbc:mysql://localhost:3306/plaguie_db}


# Use a safe default schema strategy outside development/testing.
quarkus.hibernate-orm.schema-management.strategy = update
%dev.quarkus.hibernate-orm.schema-management.strategy = drop-and-create
%test.quarkus.hibernate-orm.schema-management.strategy = update
quarkus.hibernate-orm.sql-load-script = import.sql

# Firebase configuration - path to the service account JSON file downloaded from Firebase Console
firebase.service-account-location = ${FIREBASE_SERVICE_ACCOUNT_LOCATION}
%dev.firebase.service-account-location = src/main/resources/firebase-dev.json


%test.quarkus.datasource.db-kind=h2
%test.quarkus.datasource.username=sa
%test.quarkus.datasource.password=
%test.quarkus.datasource.jdbc.url=jdbc:h2:mem:plaguie_test;DB_CLOSE_DELAY=-1;MODE=MySQL

%test.quarkus.hibernate-orm.log.sql=true
%test.quarkus.hibernate-orm.sql-load-script=no-file

# Habilitar CORS globalmente
quarkus.http.cors=true

# Permitir explícitamente el origen del frontend local configurado
quarkus.http.cors.origins=http://localhost:5173
quarkus.http.cors.allow-credentials=true

# Métodos permitidos
quarkus.http.cors.methods=GET,POST,PUT,DELETE,OPTIONS

# Encabezados permitidos
quarkus.http.cors.headers=Content-Type,Authorization

# Exponer encabezados si es necesario
quarkus.http.cors.exposed-headers=Content-Disposition

# OpenAPI / Swagger UI
quarkus.smallrye-openapi.path=/openapi
quarkus.smallrye-openapi.info-title=back-plaguie API
quarkus.smallrye-openapi.info-version=1.0.0-SNAPSHOT
quarkus.swagger-ui.always-include=true
quarkus.swagger-ui.path=/swagger-ui
